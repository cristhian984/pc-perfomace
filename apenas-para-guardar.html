<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card com tamanho ajustado</title>
<style>
    /* Reset básico */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Card */
    .card {
        width: 300px; /* Largura fixa */
        height: 400px; /* Altura fixa */
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .card img {
        width: 100%;
        height: 200px; /* Altura da imagem */
        object-fit: cover; /* Mantém proporção cortando excesso */
    }

    .card-content {
        padding: 15px;
        flex: 1;
    }

    /* Responsividade */
    @media (max-width: 500px) {
        .card {
            width: 90%; /* Ocupa quase toda a tela no celular */
            height: auto; /* Altura automática */
        }
        .card img {
            height: auto;
        }
    }
</style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Imagem do Card">
    <div class="card-content">
        <h3>Título do Card</h3>
        <p>Este é um exemplo de card com tamanho ajustado usando HTML e CSS.</p>
    </div>
</div>

</body>
</html>
