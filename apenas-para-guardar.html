<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .banner-ram{
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 60px;
}

.texto-banner{
    width: 50%;
}

.texto-banner h1{
    font-size: 60px;
    color: cyan;
}

.texto-banner p{
    font-size: 22px;
    color: white;
}

.texto-banner button{
    margin-top: 20px;
    padding: 12px 25px;

    border: none;
    border-radius: 10px;

    background: cyan;
    color: black;

    cursor: pointer;
}

.img-banner img{
    width: 350px;
}



.cards-ram{
    display: flex;
    gap: 30px;

    justify-content: center;

    margin-top: 50px;
}

.card{
    width: 300px;

    background: #001b44;

    padding: 30px;

    border-radius: 15px;

    color: white;
}
</style>
<body>
    <section class="banner-ram">

    <div class="texto-banner">
        <h1>Memória RAM</h1>

        <p>
            A memória RAM é responsável por armazenar
            temporariamente os dados usados pelo computador.
        </p>

        <button>Saiba Mais</button>
    </div>

    <div class="img-banner">
        <img src="img/ram.png">
    </div>

</section>



<section class="cards-ram">

    <article class="card">
        <h2>Frequência</h2>

        <p>
            Quanto maior a frequência,
            mais rápida será a comunicação.
        </p>
    </article>

    <article class="card">
        <h2>Dual Channel</h2>

        <p>
            Utilizar dois pentes melhora
            bastante o desempenho.
        </p>
    </article>

</section>
    
</body>
</html>
